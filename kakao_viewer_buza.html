<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식부자 공지방 뷰어 v26</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #0f172a; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #e2e8f0; }
    #root { height: 100vh; }
    #clist::-webkit-scrollbar { display: none; }
    #clist { overflow-anchor: none; overscroll-behavior: contain; }
    .loading { display:flex; align-items:center; justify-content:center; height:100vh; color:#94a3b8; font-size:13px; }
    .clist-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    @media (max-width: 600px) { .clist-inner { padding: 0 12px; } }
    select, button, input { color-scheme: dark; }
    select option { background: #1e293b; color: #e2e8f0; }
    /* TTS 선택 모드: 메시지에 호버하면 강조 */
    .tts-select-mode .msg-row { cursor: pointer !important; transition: transform .12s ease, box-shadow .12s ease; }
    .tts-select-mode .msg-row:hover { transform: translateX(2px); box-shadow: 0 0 0 2px #22d3ee, 0 4px 14px rgba(34,211,238,0.25); }
    /* 현재 읽고 있는 메시지 펄스 강조 */
    @keyframes ttsPulse {
      0%, 100% { box-shadow: 0 0 0 2px #22d3ee, 0 0 18px rgba(34,211,238,0.45); }
      50%      { box-shadow: 0 0 0 2px #22d3ee, 0 0 28px rgba(34,211,238,0.75); }
    }
    .tts-now-playing { animation: ttsPulse 1.4s ease-in-out infinite; }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.9/babel.min.js"></script>
</head>
<body>
  <div id="root"><div class="loading">로딩 중... (처음 열 때 인터넷 필요)</div></div>

  <script type="text/babel" data-presets="react">
  (function() {
    const { useState, useEffect, useRef, useCallback, useMemo, useContext, createContext } = React;

    // ═══════════════════════════════════════════════════════
    // Storage
    // ═══════════════════════════════════════════════════════
    const ls = {
      get(k) { const v = localStorage.getItem(k); return v !== null ? v : null; },
      set(k, v) { try { localStorage.setItem(k, v); } catch(e) {} },
      del(k) { localStorage.removeItem(k); }
    };

    const DB_NAME = "jubu_db", IMG_STORE = "images", MSG_STORE = "messages";
    const ROOM_ID = "project";
    let _db = null;
    function openDB() {
      if (_db) return Promise.resolve(_db);
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(IMG_STORE)) db.createObjectStore(IMG_STORE);
          if (!db.objectStoreNames.contains(MSG_STORE)) db.createObjectStore(MSG_STORE);
        };
        req.onsuccess = () => { _db = req.result; res(_db); };
        req.onerror = () => rej(req.error);
      });
    }
    async function idbPut(store, key, val) {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(store, "readwrite");
        const r = tx.objectStore(store).put(val, key);
        r.onsuccess = () => res(); r.onerror = () => rej(r.error);
      });
    }
    async function idbGet(store, key) {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(store, "readonly");
        const r = tx.objectStore(store).get(key);
        r.onsuccess = () => res(r.result || null); r.onerror = () => rej(r.error);
      });
    }
    async function idbClearStore(store) {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(store, "readwrite");
        const r = tx.objectStore(store).clear();
        r.onsuccess = () => res(); r.onerror = () => rej(r.error);
      });
    }

    const urlCache = new Map();
    async function getBlobUrl(name, defType = "image/jpeg") {
      if (urlCache.has(name)) return urlCache.get(name);
      const blob = await idbGet(IMG_STORE, name);
      if (!blob) return null;
      const typed = blob.type ? blob : new Blob([blob], { type: defType });
      const url = URL.createObjectURL(typed);
      urlCache.set(name, url);
      return url;
    }
    async function getBlobInfo(name) {
      const blob = await idbGet(IMG_STORE, name);
      return blob ? { size: blob.size, type: blob.type } : null;
    }
    function clearUrlCache() {
      for (const u of urlCache.values()) URL.revokeObjectURL(u);
      urlCache.clear();
    }

    // ═══════════════════════════════════════════════════════
    // Constants
    // ═══════════════════════════════════════════════════════
    const MERGE_MS = 60 * 1000;
    const SB_W = 16;
    const ITEM_H = 80;
    const DATE_H = 36;
    const OVERSCAN = 20;

    const NAME_ALIAS = {
      "채상욱": "채상욱", "채상욱 리더": "채상욱",
      "회색인간": "회색인간", "Gray Kim": "회색인간",
    };
    const normUser = u => NAME_ALIAS[(u||"").trim()] || (u||"알수없음").trim();

    const UCFG = {
      "채상욱":  { bg:"#1e1b4b", bc:"#312e81", tb:"#7c3aed", tc:"#ffffff", accent:"#a78bfa" },
      "회색인간":{ bg:"#172554", bc:"#1e3a8a", tb:"#3b82f6", tc:"#ffffff", accent:"#93c5fd" },
    };
    const DCFG = { bg:"transparent", bc:"transparent", tb:"#475569", tc:"#e2e8f0", accent:null };

    const K = suf => `jubu_${suf}`;

    // ═══════════════════════════════════════════════════════
    // Date parsing
    // ═══════════════════════════════════════════════════════
    function parseDate(s) {
      if (!s) return null;
      if (s instanceof Date) return isNaN(s) ? null : s;
      let m = s.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{1,2}):(\d{2})/);
      if (m) return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5]);
      m = s.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일\s*(오전|오후)\s*(\d{1,2}):(\d{2})/);
      if (m) {
        let h = +m[5];
        if (m[4]==="오후"&&h!==12) h+=12;
        if (m[4]==="오전"&&h===12) h=0;
        return new Date(+m[1],+m[2]-1,+m[3],h,+m[6]);
      }
      m = s.match(/(\d{4})\.(\d{2})\.(\d{2})\s+(\d{2}):(\d{2})/);
      if (m) return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5]);
      const d = new Date(s);
      return !isNaN(d) ? d : null;
    }
    const toDK = d => !d?"" : `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
    const toTS = d => {
      if (!d) return "";
      return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    };
    // 요일 포함 날짜 라벨: "2025.05.07" → "2025.05.07 (수)"
    const DOW_KO = ["일","월","화","수","목","금","토"];
    function fmtDateLabel(dk) {
      if (!dk) return "";
      const parts = dk.split(".");
      if (parts.length !== 3) return dk;
      const date = new Date(+parts[0], +parts[1]-1, +parts[2]);
      if (isNaN(date)) return dk;
      return `${dk} (${DOW_KO[date.getDay()]})`;
    }
    const minuteKeyOf = d => d ? `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}` : null;

    const makeFid = (user, t, msg) => `${t}|${user}|${msg.slice(0,50)}`;
    const isSystemMsg = m => /님이\s*(들어왔|나갔)습니다\.?\s*$/.test(m||"");

    // ═══════════════════════════════════════════════════════
    // Attachments
    // ═══════════════════════════════════════════════════════
    const ATTACH_RE = /^(\d{8})_(\d{6})(?:_(\d+))?\.([A-Za-z0-9]+)$/;
    const IMG_EXT = /^(jpg|jpeg|png|gif|webp|bmp|heic|heif)$/i;

    function classifyFile(name) {
      const m = name.match(ATTACH_RE);
      if (!m) return null;
      const [, date, time, seqStr, ext] = m;
      const seq = seqStr ? parseInt(seqStr) : 0;
      return { type: IMG_EXT.test(ext) ? "image" : "file", date, time, seq, ext: ext.toLowerCase(), name };
    }

    function matchPhotoMsg(msg) {
      const t = (msg||"").trim();
      const m = t.match(/^<?(사진|이미지|Photo)>?(?:\s+(\d+)장)?$/i);
      return m ? { count: m[2] ? parseInt(m[2]) : 1 } : null;
    }
    function isFileMsg(msg) {
      const t = (msg||"").trim();
      return /^(<(파일|동영상|음성메시지|Voice\s*Note)>|파일\s*[:：]\s*.+|^File\s*[:：]\s*.+|동영상|음성메시지|Voice\s*Note)$/i.test(t);
    }

    function buildAttachMap(entries) {
      const map = {};
      for (const { path } of entries) {
        const name = path.split("/").pop();
        const c = classifyFile(name);
        if (!c) continue;
        const mk = `${c.date}${c.time.slice(0,4)}`;
        if (!map[mk]) map[mk] = { images: [], files: [] };
        (c.type === "image" ? map[mk].images : map[mk].files).push(c);
      }
      for (const k in map) {
        map[k].images.sort((a,b) => a.seq - b.seq || a.time.localeCompare(b.time));
        map[k].files.sort((a,b) => a.time.localeCompare(b.time) || a.seq - b.seq);
      }
      return map;
    }

    async function saveAttachments(entries, onProgress) {
      let i = 0;
      for (const { path, entry } of entries) {
        const name = path.split("/").pop();
        if (!classifyFile(name)) { i++; continue; }
        const blob = await entry.async("blob");
        await idbPut(IMG_STORE, name, blob);
        i++;
        if (i % 5 === 0 || i === entries.length) onProgress && onProgress({ stage:"files", current:i, total:entries.length });
      }
    }

    // ═══════════════════════════════════════════════════════
    // Text parsing
    // ═══════════════════════════════════════════════════════
    function detectFormat(path, content) {
      const head = content.split(/\r?\n/).slice(0, 20).join("\n");
      if (/^\s*Date\s*,\s*User\s*,\s*Message/i.test(head)) return "csv";
      return "kakao";
    }

    function parseKakaoTxt(text) {
      const lines = text.split(/\r?\n/);
      const rows = [];
      let curDate = null;
      let last = null;
      let parsed = 0, sysSkipped = 0;

      const dateSecRe = /^\s*[-=]*\s*(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일(?:\s*[월화수목금토일]요일)?\s*[-=]*\s*$/;
      const koDotMsg = /^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{1,2}):(\d{2}),\s*(.+?)\s*:\s*(.*)$/;
      const koDotSys = /^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{1,2}):(\d{2}):\s*.+$/;
      const macRe = /^\[([^\]]+)\]\s*\[(오전|오후)\s*(\d{1,2}):(\d{2})\]\s*(.*)$/;
      const winRe = /^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일\s*(오전|오후)\s*(\d{1,2}):(\d{2}),\s*(.+?)\s*:\s*(.*)$/;
      const skipRe = /^(Talk_|저장한 날짜|Saved Date|카카오톡 대화|Chat with|.+ 님과 카카오톡|메시지가 삭제되었습니다)/i;

      for (const raw of lines) {
        const trimmed = raw.trim();

        if (!trimmed) {
          if (last) last.Message += "\n";
          continue;
        }

        const ds = trimmed.match(dateSecRe);
        if (ds) { curDate = { y:+ds[1], mo:+ds[2], d:+ds[3] }; last = null; continue; }

        if (skipRe.test(trimmed)) { last = null; continue; }

        let m = trimmed.match(koDotMsg);
        if (m) {
          last = { Date: `${m[1]}. ${m[2]}. ${m[3]}. ${m[4]}:${m[5]}`, User: m[6].trim(), Message: m[7] };
          rows.push(last); parsed++; continue;
        }
        if (koDotSys.test(trimmed)) { last = null; sysSkipped++; continue; }

        m = raw.match(macRe);
        if (m && curDate) {
          last = { Date: `${curDate.y}년 ${curDate.mo}월 ${curDate.d}일 ${m[2]} ${m[3]}:${m[4]}`, User: m[1].trim(), Message: m[5] };
          rows.push(last); parsed++; continue;
        }

        m = raw.match(winRe);
        if (m) {
          last = { Date: `${m[1]}년 ${m[2]}월 ${m[3]}일 ${m[4]} ${m[5]}:${m[6]}`, User: m[7].trim(), Message: m[8] };
          rows.push(last); parsed++; continue;
        }

        if (last) last.Message += "\n" + raw;
      }
      console.log(`[txt] 파싱: 메시지 ${parsed}개, 시스템 ${sysSkipped}개 스킵`);
      return rows;
    }

    function parseText(content, fmt) {
      if (fmt === "csv") return Papa.parse(content, { header: true, skipEmptyLines: true }).data;
      return parseKakaoTxt(content);
    }

    function buildMessages(rows, attachMap) {
      const out = [];
      const avail = {};
      for (const k in attachMap) avail[k] = { images:[...attachMap[k].images], files:[...attachMap[k].files] };
      let imgM = 0, fileM = 0;

      for (const row of rows) {
        const rawMsg = row.Message || "";
        if (isSystemMsg(rawMsg)) continue;
        const user = normUser(row.User);
        const d = parseDate(row.Date);
        const t = d ? d.getTime() : 0;
        const mk = minuteKeyOf(d);

        let images = [], files = [];
        if (mk && avail[mk]) {
          const photo = matchPhotoMsg(rawMsg);
          if (photo && avail[mk].images.length > 0) {
            const taken = avail[mk].images.splice(0, photo.count);
            images = taken.map(c => c.name);
            imgM += taken.length;
          }
          if (isFileMsg(rawMsg) && avail[mk].files.length > 0) {
            const taken = avail[mk].files.splice(0, 1);
            files = taken.map(c => c.name);
            fileM += taken.length;
          }
        }

        const prev = out[out.length-1];
        if (prev && prev.user === user && d && (t - prev._lt) < MERGE_MS) {
          prev.msg += "\n" + rawMsg;
          if (images.length) prev.images = [...(prev.images||[]), ...images];
          if (files.length) prev.files = [...(prev.files||[]), ...files];
          prev._lt = t;
        } else {
          const e = { fid: makeFid(user,t,rawMsg), user, msg:rawMsg, dk:toDK(d), ts:toTS(d), _t:t, _lt:t };
          if (images.length) e.images = images;
          if (files.length) e.files = files;
          out.push(e);
        }
      }

      let imgL = 0, fileL = 0;
      for (const k in avail) { imgL += avail[k].images.length; fileL += avail[k].files.length; }
      console.log(`[attach] 이미지 ${imgM} 매칭/${imgL} 미매칭, 파일 ${fileM} 매칭/${fileL} 미매칭`);
      return { messages: out, stats: { imgMatched:imgM, imgLeft:imgL, fileMatched:fileM, fileLeft:fileL } };
    }

    function mergeMsgs(existing, incoming) {
      const byFid = new Map(existing.map(m => [m.fid, m]));
      const result = [...existing];
      for (const nm of incoming) {
        const ex = byFid.get(nm.fid);
        if (ex) {
          if (nm.images && (!ex.images || ex.images.length === 0)) ex.images = nm.images;
          if (nm.files && (!ex.files || ex.files.length === 0)) ex.files = nm.files;
        } else {
          result.push(nm);
        }
      }
      result.sort((a,b) => a._t - b._t);
      result.forEach(m => { delete m._lt; });
      return result;
    }

    function finalize(arr) {
      arr.sort((a,b) => a._t - b._t);
      arr.forEach(m => { delete m._lt; });
      return arr;
    }

    async function processZip(file) {
      const zip = await JSZip.loadAsync(file);
      const entries = [];
      zip.forEach((path, entry) => { if (!entry.dir) entries.push({ path, entry }); });
      const textEntry = entries.find(e => /\.(csv|txt)$/i.test(e.path));
      if (!textEntry) throw new Error("ZIP 안에 .csv 또는 .txt 파일이 없습니다.");
      const attachEntries = entries.filter(e => classifyFile(e.path.split("/").pop()));
      const textContent = await textEntry.entry.async("string");
      const fmt = detectFormat(textEntry.path, textContent);
      const rows = parseText(textContent, fmt);
      console.log(`[zip] ${rows.length}행 (${fmt}), 첨부 후보 ${attachEntries.length}`);
      return { rows, attachEntries, format: fmt };
    }

    // ═══════════════════════════════════════════════════════
    // Persist messages
    // ═══════════════════════════════════════════════════════
    const STORE_FIELDS = ["fid","user","msg","dk","ts","_t","images","files"];

    async function loadMsgs() {
      try {
        const data = await idbGet(MSG_STORE, ROOM_ID);
        if (data && Array.isArray(data)) {
          return data.filter(m => !isSystemMsg(m.msg)).map(m => {
            const u = normUser(m.user);
            // 기존에 저장된 메시지는 "오전/오후" 형식의 ts를 가지고 있을 수 있음.
            // _t(타임스탬프)가 있으면 거기서 24시간 형식 ts를 새로 계산해 덮어씀.
            const ts = m._t ? toTS(new Date(m._t)) : m.ts;
            return { ...m, user: u, ts };
          });
        }
      } catch(e) { console.warn("로드 실패:", e); }
      return null;
    }
    async function saveMsgsToStore(msgs) {
      const compact = msgs.map(m => {
        const o = {};
        for (const k of STORE_FIELDS) if (m[k] !== undefined) o[k] = m[k];
        return o;
      });
      try { await idbPut(MSG_STORE, ROOM_ID, compact); }
      catch(e) { console.error("저장 실패:", e); alert("메시지 저장 실패: " + e.message); }
    }

    const BS = { background:"#1e293b", border:"1px solid #475569", borderRadius:6, color:"#e2e8f0", padding:"4px 11px", fontSize:12, cursor:"pointer", fontFamily:"inherit", fontWeight:500 };

    // ═══════════════════════════════════════════════════════
    // Lightbox
    // ═══════════════════════════════════════════════════════
    const LightboxContext = createContext(null);

    function Lightbox({ url, onClose }) {
      useEffect(() => {
        const onKey = e => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [onClose]);
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,cursor:"zoom-out"}}>
          <img src={url} onClick={e=>e.stopPropagation()} style={{maxWidth:"95%",maxHeight:"95%",objectFit:"contain",cursor:"default",boxShadow:"0 0 60px rgba(0,0,0,0.8)"}} />
          <div style={{position:"absolute",top:16,right:20,color:"#fff",fontSize:12,background:"rgba(0,0,0,0.45)",padding:"4px 10px",borderRadius:6,pointerEvents:"none"}}>ESC 또는 배경 클릭으로 닫기</div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // Image / File
    // ═══════════════════════════════════════════════════════
    function LazyImage({ name }) {
      const [url, setUrl] = useState(null);
      const [error, setError] = useState(false);
      const openLightbox = useContext(LightboxContext);
      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const u = await getBlobUrl(name);
            if (cancelled) return;
            if (u) setUrl(u); else setError(true);
          } catch(e) { if (!cancelled) setError(true); }
        })();
        return () => { cancelled = true; };
      }, [name]);

      const box = { width:140, height:140, borderRadius:6 };
      if (error) return (
        <div title={name} style={{...box, background:"#1e293b",border:"1px dashed #334155",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#64748b",fontSize:10,gap:4}}>
          <div style={{fontSize:22}}>🖼️</div><div>이미지 없음</div>
        </div>
      );
      if (!url) return <div style={{...box, background:"#1e293b"}} />;
      return (
        <img src={url} loading="lazy" alt={name} onClick={e => { e.stopPropagation(); openLightbox(url); }}
          style={{...box, objectFit:"cover", cursor:"zoom-in", border:"1px solid #334155"}} />
      );
    }

    function ImageGallery({ images }) {
      return (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}} onClick={e=>e.stopPropagation()}>

    const FILE_ICONS = {
      pdf:"📄", doc:"📝", docx:"📝", hwp:"📝",
      xls:"📊", xlsx:"📊", csv:"📊",
      ppt:"📽️", pptx:"📽️",
      zip:"🗜️", rar:"🗜️", "7z":"🗜️", tar:"🗜️", gz:"🗜️",
      mp3:"🎵", m4a:"🎵", wav:"🎵", ogg:"🎵", flac:"🎵",
      mp4:"🎬", mov:"🎬", avi:"🎬", mkv:"🎬", webm:"🎬", m4v:"🎬",
      txt:"📃", md:"📃",
    };
    const formatSize = b => !b ? "" : b < 1024 ? `${b} B` : b < 1024*1024 ? `${(b/1024).toFixed(1)} KB` : `${(b/(1024*1024)).toFixed(1)} MB`;

    function FileCard({ name }) {

    // ═══════════════════════════════════════════════════════
    // Message
    // ═══════════════════════════════════════════════════════
    function displayText(m) {
      if (!m.msg) return "";
      const hasImg = m.images && m.images.length > 0;
      const hasFile = m.files && m.files.length > 0;
      if (!hasImg && !hasFile) return m.msg;
      let lines = m.msg.split("\n");
      if (hasImg) lines = lines.filter(l => !matchPhotoMsg(l));
      if (hasFile) lines = lines.filter(l => !isFileMsg(l));
      return lines.join("\n");
    }

    // ═══════════════════════════════════════════════════════
    // TTS
    // ═══════════════════════════════════════════════════════
    const TTS_TARGET_USERS = ["채상욱", "회색인간"];

    // 한 메시지의 텍스트를 TTS용으로 정제
    function cleanForTTS(text) {
      if (!text) return "";
      let t = text;
      // URL → "링크" (긴 URL을 글자 단위로 읽지 않도록)
      t = t.replace(/https?:\/\/\S+/gi, " 링크 ");
      // 다중 공백/개행 정리
      t = t.replace(/\s+/g, " ").trim();
      return t;
    }

    // 시작 메시지(fid)부터 끝까지 TTS 큐 생성
    // - 채상욱 / 회색인간 메시지만 포함
    // - 텍스트가 비어있는(이미지/파일만 있는) 메시지는 제외
    // - 연속해서 같은 화자가 말하면 두 번째 메시지부터 화자명 생략
    function buildTTSQueue(msgs, startFid) {
      if (!msgs || !msgs.length) return [];
      const startIdx = msgs.findIndex(m => m.fid === startFid);
      if (startIdx < 0) return [];
      const queue = [];
      let lastUser = null;
      for (let i = startIdx; i < msgs.length; i++) {
        const m = msgs[i];
        if (!TTS_TARGET_USERS.includes(m.user)) continue;
        const cleaned = cleanForTTS(displayText(m));
        if (!cleaned) continue;
        const speakerPrefix = (m.user === lastUser) ? "" : (m.user + ". ");
        queue.push({ fid: m.fid, user: m.user, text: speakerPrefix + cleaned, body: cleaned });
        lastUser = m.user;
      }
      return queue;
    }

    // 긴 텍스트를 TTS 청크로 분할 (Chrome의 ~15초 끊김 버그 회피용)
    // 문장 부호 기준으로 자르고, 그래도 길면 강제로 자른다.
    function splitForTTS(text, maxLen = 180) {
      if (!text) return [];
      if (text.length <= maxLen) return [text];
      const out = [];
      // 1차: 문장부호 기준 분할
      const sentences = text.split(/(?<=[.!?。．！？])\s+|\n+/);
      let buf = "";
      for (const s of sentences) {
        if (!s) continue;
        if ((buf + " " + s).trim().length <= maxLen) {
          buf = (buf ? buf + " " : "") + s;
        } else {
          if (buf) out.push(buf);
          if (s.length <= maxLen) {
            buf = s;
          } else {
            // 문장 자체가 너무 길면 maxLen 단위로 강제 절단
            for (let i = 0; i < s.length; i += maxLen) out.push(s.slice(i, i + maxLen));
            buf = "";
          }
        }
      }
      if (buf) out.push(buf);
      return out.filter(Boolean);
    }

    function Msg({ m, isHL, onHL, fs, ttsSelectMode, ttsNowPlaying, onTTSPick }) {
      const c = UCFG[m.user]||DCFG;
      const text = displayText(m);
      const hasImages = m.images && m.images.length > 0;

      // TTS 선택 모드: 비대상 화자는 흐리게 (클릭하면 다음 대상부터 재생됨을 시사)
      if (ttsSelectMode && !isTarget) baseStyle.opacity = 0.55;

      const handleClick = (e) => {

      const className = "msg-row" + (ttsNowPlaying ? " tts-now-playing" : "");

            {hasFiles && <span style={{fontSize:10,color:"#cbd5e1",background:"#334155",borderRadius:3,padding:"1px 6px"}}>📎 {m.files.length}</span>}
            {ttsNowPlaying && <span style={{fontSize:10,color:"#0e7490",background:"#22d3ee",borderRadius:3,padding:"1px 6px",fontWeight:700}}>🔊 재생 중</span>}
            {isHL&&<span style={{marginLeft:"auto",color:"#fbbf24",fontSize:11,fontWeight:700}}>✏ 형광펜</span>}
          </div>
          {text && <div style={{fontSize:fs,lineHeight:1.75,color:"#e2e8f0",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{text}</div>}

    // ═══════════════════════════════════════════════════════
    // Virtual list
    // ═══════════════════════════════════════════════════════
    // Wrapper that measures its actual rendered height and reports back.
    // This lets the parent build an accurate posIndex so scrolling doesn't
    // jump when the slice of visible items shifts.
    function MeasuredRow({ itemKey, onMeasure, children }) {
      const ref = useRef(null);
      React.useLayoutEffect(() => {
        if (!ref.current || !onMeasure) return;
        const h = ref.current.getBoundingClientRect().height;
        if (h > 0) onMeasure(itemKey, h);
      });
      return <div ref={ref}>{children}</div>;
    }

    function VirtualList({ flat, posIndex, totalH, hl, fs, onHL, listRef, onScroll, onMeasure, ttsSelectMode, ttsCurrentFid, onTTSPick }) {
      const [scrollTop, setScrollTop] = useState(0);
      const [viewH, setViewH] = useState(600);

      // Throttle scroll updates with requestAnimationFrame so we re-render
      // at most once per frame even when wheel events fire rapidly.
      useEffect(() => {
        const el = listRef.current; if (!el) return;
        let rafId = null;
        const upd = () => {
          rafId = null;
          setScrollTop(el.scrollTop);
          setViewH(el.clientHeight);
          onScroll && onScroll(el.scrollTop, el.clientHeight);
        };
        const onScrollEvt = () => {
          if (rafId == null) rafId = requestAnimationFrame(upd);
        };
        el.addEventListener("scroll", onScrollEvt, { passive:true });
        const obs = new ResizeObserver(upd);
        obs.observe(el);
        upd();
        return () => {
          el.removeEventListener("scroll", onScrollEvt);
          obs.disconnect();
          if (rafId != null) cancelAnimationFrame(rafId);
        };
      }, [listRef, onScroll]);

      const findIdx = useCallback((y) => {
        const offs = posIndex;
        let lo = 0, hi = offs.length - 1;
        while (lo < hi) {
          const mid = (lo + hi) >> 1;
          if (offs[mid] < y) lo = mid + 1; else hi = mid;
        }
        return Math.max(0, lo - 1);
      }, [posIndex]);

      const startIdx = Math.max(0, findIdx(scrollTop) - OVERSCAN);
      const endIdx = Math.min(flat.length, findIdx(scrollTop + viewH) + OVERSCAN);
      const visible = flat.slice(startIdx, endIdx);
      const topPad = posIndex[startIdx] || 0;

      return (
        <div style={{position:"relative", height: totalH}}>
          <div style={{position:"absolute", top: topPad, left:0, right:0}}>
            {visible.map((item) => {
              if (item.type === "date") {
                return (
                  <MeasuredRow key={item.key} itemKey={item.key} onMeasure={onMeasure}>
                    <div style={{height: DATE_H, display:"flex", alignItems:"center", justifyContent:"center"}}>
                      <span style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:"3px 18px",fontSize:11,color:"#94a3b8",fontWeight:600,boxShadow:"none"}}>{fmtDateLabel(item.dk)}</span>
                    </div>
                  </MeasuredRow>
                );
              }
              return (
                <MeasuredRow key={item.key} itemKey={item.key} onMeasure={onMeasure}>
                  <Msg m={item.m} isHL={hl.has(item.m.fid)} onHL={onHL} fs={fs}
                       ttsSelectMode={ttsSelectMode}
                       ttsNowPlaying={ttsCurrentFid === item.m.fid}
                       onTTSPick={onTTSPick} />
                </MeasuredRow>
              );
            })}
          </div>
        </div>
      );
    }

    function MergeDialog({ onMerge, onReplace, onCancel, newCount, existCount, attachCount }) {

    // ═══════════════════════════════════════════════════════
    // App
    // ═══════════════════════════════════════════════════════
    function App() {
      const [msgs, setMsgs] = useState(null);
      const [hl, setHL] = useState(new Set());
      const [fs, setFs] = useState(14);
      const [scrollSt, setScrollSt] = useState({ st:0, ch:600 });
      const [pending, setPending] = useState(null);
      const [loading, setLoading] = useState(true);
      const [processing, setProcessing] = useState(null);
      const [lightboxUrl, setLightboxUrl] = useState(null);
      const [stats, setStats] = useState(null);

      const listRef = useRef(null);
      const trackRef = useRef(null);
      const drag = useRef(null);
      const scrollRestored = useRef(false);
      const scrollSaveTimer = useRef(null);

      // ─────────────────────────────────────────────
      // TTS state
      // ─────────────────────────────────────────────
      const ttsSupported = typeof window !== "undefined" && "speechSynthesis" in window;
      const [ttsSelectMode, setTtsSelectMode] = useState(false);
      const [ttsState, setTtsState] = useState({ active:false, paused:false, idx:-1, total:0, fid:null });
      const [ttsRate, setTtsRate] = useState(1.0);

      const ttsQueueRef = useRef([]);          // [{fid,user,text,body}, ...]
      const ttsIdxRef = useRef(0);
      const ttsRateRef = useRef(1.0);
      const ttsVoiceRef = useRef(null);
      const ttsTokenRef = useRef(0);           // 취소 토큰: 무효 utterance의 onend가 다음 항목으로 진행하는 것을 차단
      const ttsKeepAliveRef = useRef(null);    // Chrome ~15초 끊김 버그 회피

      useEffect(() => { ttsRateRef.current = ttsRate; }, [ttsRate]);

      // 한국어 음성 로드 (voices는 비동기로 로드됨)
      useEffect(() => {
        if (!ttsSupported) return;
        const pickVoice = () => {
          const voices = window.speechSynthesis.getVoices();
          if (!voices || !voices.length) return;
          // 한국어 음성 선호. 없으면 default voice.
          const ko = voices.find(v => /^ko/i.test(v.lang)) || voices.find(v => /korean/i.test(v.name));
          ttsVoiceRef.current = ko || null;
        };
        pickVoice();
        window.speechSynthesis.onvoiceschanged = pickVoice;
        return () => {
          try { window.speechSynthesis.onvoiceschanged = null; } catch(e){}
        };
      }, [ttsSupported]);

      // 청크를 순차 재생하고, 끝나면 다음 큐 항목으로
      const playQueueAt = useCallback((i) => {
        if (!ttsSupported) return;
        const queue = ttsQueueRef.current;
        if (i < 0 || i >= queue.length) {
          // 종료
          ttsTokenRef.current++;
          try { window.speechSynthesis.cancel(); } catch(e){}
          if (ttsKeepAliveRef.current) { clearInterval(ttsKeepAliveRef.current); ttsKeepAliveRef.current = null; }
          setTtsState({ active:false, paused:false, idx:-1, total:queue.length, fid:null });
          return;
        }
        const myToken = ++ttsTokenRef.current;
        ttsIdxRef.current = i;
        const item = queue[i];
        setTtsState({ active:true, paused:false, idx:i, total:queue.length, fid:item.fid });

        // 화면을 해당 메시지로 자동 스크롤
        try {
          const off = posByFidRef.current[item.fid];
          if (off != null && listRef.current) {
            listRef.current.scrollTo({ top: Math.max(0, off - 80), behavior: "smooth" });
          }
        } catch(e){}

        // 메시지를 청크로 쪼개서 순차 재생
        const chunks = splitForTTS(item.text, 180);
        let ci = 0;
        const speakChunk = () => {
          if (ttsTokenRef.current !== myToken) return;
          if (ci >= chunks.length) {
            // 다음 큐 항목으로
            playQueueAt(i + 1);
            return;
          }
          const u = new SpeechSynthesisUtterance(chunks[ci]);
          u.lang = "ko-KR";
          u.rate = ttsRateRef.current || 1.0;
          if (ttsVoiceRef.current) u.voice = ttsVoiceRef.current;
          u.onend = () => {
            if (ttsTokenRef.current !== myToken) return;
            ci++;
            speakChunk();
          };
          u.onerror = (ev) => {
            // 'canceled'/'interrupted' 는 사용자 조작이므로 무시
            if (ttsTokenRef.current !== myToken) return;
            ci++;
            speakChunk();
          };
          try { window.speechSynthesis.speak(u); } catch(e){}
        };
        speakChunk();
      }, [ttsSupported]);

      // posByFid 를 ref로도 노출 (playQueueAt 내부에서 stale closure 방지)
      const posByFidRef = useRef({});

      const ttsStop = useCallback(() => {
        ttsTokenRef.current++;
        try { window.speechSynthesis.cancel(); } catch(e){}
        if (ttsKeepAliveRef.current) { clearInterval(ttsKeepAliveRef.current); ttsKeepAliveRef.current = null; }
        ttsQueueRef.current = [];
        ttsIdxRef.current = 0;
        setTtsState({ active:false, paused:false, idx:-1, total:0, fid:null });
        setTtsSelectMode(false);
      }, []);

      const ttsPauseToggle = useCallback(() => {
        if (!ttsSupported) return;
        const ss = window.speechSynthesis;
        if (ss.paused) {
          ss.resume();
          setTtsState(s => ({ ...s, paused:false }));
        } else if (ss.speaking) {
          ss.pause();
          setTtsState(s => ({ ...s, paused:true }));
        }
      }, [ttsSupported]);

      const ttsNext = useCallback(() => {
        const queue = ttsQueueRef.current;
        if (!queue.length) return;
        const next = Math.min(queue.length - 1, ttsIdxRef.current + 1);
        ttsTokenRef.current++;
        try { window.speechSynthesis.cancel(); } catch(e){}
        setTimeout(() => playQueueAt(next), 30);
      }, [playQueueAt]);

      const ttsPrev = useCallback(() => {
        if (!ttsQueueRef.current.length) return;
        const prev = Math.max(0, ttsIdxRef.current - 1);
        ttsTokenRef.current++;
        try { window.speechSynthesis.cancel(); } catch(e){}
        setTimeout(() => playQueueAt(prev), 30);
      }, [playQueueAt]);

      // 메시지 클릭 → 큐 생성 후 재생 시작
      const ttsStartFromFid = useCallback((fid) => {
        if (!ttsSupported || !msgs) return;
        const queue = buildTTSQueue(msgs, fid);
        if (!queue.length) {
          alert("이 위치 이후에 채상욱/회색인간 메시지가 없습니다.");
          return;
        }
        ttsQueueRef.current = queue;
        ttsIdxRef.current = 0;
        ttsTokenRef.current++;
        try { window.speechSynthesis.cancel(); } catch(e){}
        setTtsSelectMode(false);
        // Chrome ~15초 끊김 버그 회피: speaking 중일 때 주기적으로 pause/resume
        if (ttsKeepAliveRef.current) clearInterval(ttsKeepAliveRef.current);
        ttsKeepAliveRef.current = setInterval(() => {
          try {
            const ss = window.speechSynthesis;
            if (ss.speaking && !ss.paused) { ss.pause(); ss.resume(); }
          } catch(e){}
        }, 10000);
        setTimeout(() => playQueueAt(0), 30);
      }, [msgs, ttsSupported, playQueueAt]);

      // 언마운트 시 정리
      useEffect(() => {
        return () => {
          try { window.speechSynthesis.cancel(); } catch(e){}
          if (ttsKeepAliveRef.current) { clearInterval(ttsKeepAliveRef.current); ttsKeepAliveRef.current = null; }
        };
      }, []);

      // Per-item measured heights (key -> height in px). Used to build an
      // accurate posIndex so virtual-list slice changes don't visually jump.
      const heightsRef = useRef(new Map());
      const [posVersion, setPosVersion] = useState(0);
      const rebuildPending = useRef(false);

      const onMeasure = useCallback((key, h) => {
        const stored = heightsRef.current.get(key);
        if (stored == null || Math.abs(stored - h) > 0.5) {
          heightsRef.current.set(key, h);
          if (!rebuildPending.current) {
            rebuildPending.current = true;
            requestAnimationFrame(() => {
              rebuildPending.current = false;
              setPosVersion(v => v + 1);
            });
          }
        }
      }, []);

      // Clear measurements on window resize (text wrapping changes height)
      useEffect(() => {
        let timer;
        const onResize = () => {
          clearTimeout(timer);
          timer = setTimeout(() => {
            heightsRef.current.clear();
            setPosVersion(v => v + 1);
          }, 200);
        };
        window.addEventListener("resize", onResize);
        return () => { window.removeEventListener("resize", onResize); clearTimeout(timer); };
      }, []);

      // Load on mount
      useEffect(() => {
        (async () => {
          try { const v = ls.get(K("hl")); if (v) setHL(new Set(JSON.parse(v))); } catch(e){}
          try { const v = ls.get(K("fs")); if (v) setFs(+v||14); } catch(e){}
          const stored = await loadMsgs();
          if (stored && stored.length > 0) setMsgs(stored);
          else setMsgs([]);
          setLoading(false);
        })();
      }, []);

      // Auto-dismiss stats banner
      useEffect(() => {
        if (!stats) return;
        const t = setTimeout(() => setStats(null), 8000);
        return () => clearTimeout(t);
      }, [stats]);

      // Build flat list and position index
      const { flat, posIndex, totalH, dates, posByFid } = useMemo(() => {
        if (!msgs || msgs.length === 0) return { flat:[], posIndex:[0], totalH:0, dates:[], posByFid:{} };
        const dateSet = new Set();
        for (const m of msgs) if (m.dk) dateSet.add(m.dk);
        const ds = [...dateSet];
        const byDate = {};
        for (const m of msgs) {
          if (!byDate[m.dk]) byDate[m.dk] = [];
          byDate[m.dk].push(m);
        }
        const f = [];
        for (const dk of ds) {
          f.push({ type:"date", dk, key:`d:${dk}` });
          for (const m of (byDate[dk] || [])) f.push({ type:"msg", m, key:`m:${m.fid}` });
        }
        const offs = new Array(f.length + 1);
        offs[0] = 0;
        const fidPos = {};
        const heights = heightsRef.current;
        for (let i=0; i<f.length; i++) {
          const item = f[i];
          const measured = heights.get(item.key);
          const h = measured != null ? measured : (item.type === "date" ? DATE_H : ITEM_H);
          offs[i+1] = offs[i] + h;
          if (item.type === "msg") fidPos[item.m.fid] = offs[i];
        }
        return { flat:f, posIndex:offs, totalH:offs[f.length], dates:ds, posByFid:fidPos };
      }, [msgs, posVersion]);

      // playQueueAt 클로저가 항상 최신 posByFid를 참조하도록 ref에 동기화
      useEffect(() => { posByFidRef.current = posByFid; }, [posByFid]);

      // Restore scroll position once
      useEffect(() => {
        if (!loading && msgs && totalH > 0 && !scrollRestored.current) {
          scrollRestored.current = true;
          setTimeout(() => {
            const v = ls.get(K("pos"));
            if (v && listRef.current) listRef.current.scrollTop = +v;
          }, 100);
        }
      }, [loading, msgs, totalH]);

      const applyMsgs = useCallback(async arr => {
        setMsgs(arr);
        await saveMsgsToStore(arr);
      }, []);

      const handleFile = useCallback(async (file) => {
        const isZip = /\.zip$/i.test(file.name);
        try {
          if (isZip) {
            setProcessing({ stage:"unzipping", current:0, total:0 });
            const { rows, attachEntries } = await processZip(file);
            setProcessing({ stage:"parse", current:0, total:1 });
            const attachMap = buildAttachMap(attachEntries);
            const { messages: newMsgs, stats: newStats } = buildMessages(rows, attachMap);

            const stored = await loadMsgs();
            if (stored && stored.length > 0) {
              setProcessing(null);
              setPending({ newMsgs, existMsgs:stored, attachEntries, stats: newStats });
            } else {
              setProcessing({ stage:"files", current:0, total:attachEntries.length });
              await saveAttachments(attachEntries, setProcessing);
              await applyMsgs(finalize(newMsgs));
              setProcessing(null);
              setStats({ msgs: newMsgs.length, ...newStats });
            }
          } else {
            const text = await file.text();
            const fmt = detectFormat(file.name, text);
            const rows = parseText(text, fmt);
            const { messages: newMsgs, stats: newStats } = buildMessages(rows, {});
            const stored = await loadMsgs();
            if (stored && stored.length > 0) {
              setPending({ newMsgs, existMsgs:stored, attachEntries:null, stats: newStats });
            } else {
              await applyMsgs(finalize(newMsgs));
              setStats({ msgs: newMsgs.length, ...newStats });
            }
          }
        } catch(e) {
          setProcessing(null);
          alert("파일 처리 실패: " + e.message);
          console.error(e);
        }
      }, [applyMsgs]);

      const onMerge = useCallback(async () => {
        if (!pending) return;
        if (pending.attachEntries && pending.attachEntries.length > 0) {
          setProcessing({ stage:"files", current:0, total:pending.attachEntries.length });
          await saveAttachments(pending.attachEntries, setProcessing);
          setProcessing(null);
        }
        const merged = mergeMsgs(pending.existMsgs, pending.newMsgs);
        await applyMsgs(merged);
        setStats({ msgs: pending.newMsgs.length, ...pending.stats });
        setPending(null);
      }, [pending, applyMsgs]);

      const onReplace = useCallback(async () => {
        if (!pending) return;
        clearUrlCache();
        await idbClearStore(IMG_STORE);
        if (pending.attachEntries && pending.attachEntries.length > 0) {
          setProcessing({ stage:"files", current:0, total:pending.attachEntries.length });
          await saveAttachments(pending.attachEntries, setProcessing);
          setProcessing(null);
        }
        await applyMsgs(finalize(pending.newMsgs));
        setHL(new Set());
        ls.set(K("hl"), "[]");
        ls.set(K("pos"), "0");
        setStats({ msgs: pending.newMsgs.length, ...pending.stats });
        setPending(null);
      }, [pending, applyMsgs]);

      const onScroll = useCallback((st, ch) => {
        setScrollSt({ st, ch });
        clearTimeout(scrollSaveTimer.current);
        scrollSaveTimer.current = setTimeout(() => ls.set(K("pos"), String(st)), 700);
      }, []);

      // Custom scrollbar geometry
      const ch = scrollSt.ch || 600;
      const sh = totalH || 1;
      const st = scrollSt.st || 0;
      const th = Math.max(30, (ch/Math.max(sh,1)) * ch);
      const ms = Math.max(0, sh - ch);
      const tt = ms > 0 ? (st/ms) * (ch - th) : 0;

      const onTD = useCallback(e => {
        e.preventDefault(); e.stopPropagation();
        drag.current = { y0: e.clientY, s0: listRef.current?.scrollTop || 0 };
        const mv = ev => { if (!drag.current || !listRef.current) return; listRef.current.scrollTop = drag.current.s0 + (ev.clientY - drag.current.y0)/(ch-th)*ms; };
        const up = () => { drag.current = null; window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up); };
        window.addEventListener("mousemove", mv); window.addEventListener("mouseup", up);
      }, [ch, th, ms]);

      const onTC = useCallback(e => {
        if (!listRef.current || !trackRef.current) return;
        const r = trackRef.current.getBoundingClientRect();
        listRef.current.scrollTop = ((e.clientY - r.top)/ch) * ms;
      }, [ch, ms]);

      const scrollToFid = useCallback(fid => {
        if (!listRef.current) return;
        const off = posByFid[fid];
        if (off != null) listRef.current.scrollTop = Math.max(0, off - 70);
      }, [posByFid]);

      const scrollToDate = useCallback(dk => {
        if (!msgs) return;
        const m = msgs.find(mm => mm.dk === dk);
        if (m) scrollToFid(m.fid);
      }, [msgs, scrollToFid]);

      const toggleHL = useCallback(fid => {
        setHL(p => { const n = new Set(p); n.has(fid) ? n.delete(fid) : n.add(fid); ls.set(K("hl"), JSON.stringify([...n])); return n; });
      }, []);

      const hlMsgs = useMemo(() => msgs ? msgs.filter(m => hl.has(m.fid)) : [], [msgs, hl]);

      const navHL = useCallback(dir => {
        if (!hlMsgs.length || !listRef.current) return;
        const cur = listRef.current.scrollTop;
        const sorted = hlMsgs.map(m => ({ fid:m.fid, off: posByFid[m.fid] || 0 })).sort((a,b) => a.off - b.off);
        if (dir === "n") {
          const found = sorted.find(s => s.off > cur + 50) || sorted[0];
          scrollToFid(found.fid);
        } else {
          const found = [...sorted].reverse().find(s => s.off < cur - 50) || sorted[sorted.length-1];
          scrollToFid(found.fid);
        }
      }, [hlMsgs, posByFid, scrollToFid]);

      // Jump one message at a time
      const navByMsg = useCallback(dir => {
        if (!listRef.current || !flat.length) return;
        const el = listRef.current;
        const cur = el.scrollTop;
        const offsets = [];
        for (let i = 0; i < flat.length; i++) {
          if (flat[i].type === "msg") offsets.push(posIndex[i]);
        }
        if (!offsets.length) return;
        // The "current" message is the first one at or below the viewport top
        let curIdx = offsets.findIndex(o => o >= cur - 4);
        if (curIdx < 0) curIdx = offsets.length - 1;
        const targetIdx = dir === "down"
          ? Math.min(offsets.length - 1, curIdx + 1)
          : Math.max(0, curIdx - 1);
        const top = Math.max(0, offsets[targetIdx] - 4);
        el.scrollTo({ top, behavior: "smooth" });
      }, [flat, posIndex]);

      // Jump one date (day) at a time
      const navByDate = useCallback(dir => {
        if (!listRef.current || !flat.length) return;
        const el = listRef.current;
        const cur = el.scrollTop;
        const offsets = [];
        for (let i = 0; i < flat.length; i++) {
          if (flat[i].type === "date") offsets.push(posIndex[i]);
        }
        if (!offsets.length) return;
        let curIdx = offsets.findIndex(o => o >= cur - 4);
        if (curIdx < 0) curIdx = offsets.length - 1;
        const targetIdx = dir === "down"
          ? Math.min(offsets.length - 1, curIdx + 1)
          : Math.max(0, curIdx - 1);
        const top = Math.max(0, offsets[targetIdx]);
        el.scrollTo({ top, behavior: "smooth" });
      }, [flat, posIndex]);

      // Global keyboard navigation: arrow keys = message, mod+arrow = date
      useEffect(() => {
        const onKey = e => {
          if (lightboxUrl || pending) return;
          const tag = (e.target && e.target.tagName) || "";
          if (/^(INPUT|TEXTAREA|SELECT)$/.test(tag)) return;
          // ESC: TTS 선택 모드 / 재생 중지
          if (e.key === "Escape") {
            if (ttsState.active) { e.preventDefault(); ttsStop(); return; }
            if (ttsSelectMode) { e.preventDefault(); setTtsSelectMode(false); return; }
          }
          // Space: TTS 재생/일시정지 토글 (재생 중일 때만)
          if (e.key === " " && ttsState.active) {
            e.preventDefault();
            ttsPauseToggle();
            return;
          }
          if (e.altKey || e.shiftKey) return;
          if (e.key === "ArrowDown") {
            e.preventDefault();
            if (e.metaKey || e.ctrlKey) navByDate("down");
            else navByMsg("down");
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (e.metaKey || e.ctrlKey) navByDate("up");
            else navByMsg("up");
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [navByMsg, navByDate, lightboxUrl, pending, ttsState.active, ttsSelectMode, ttsStop, ttsPauseToggle]);

      const markers = useMemo(() => {
        if (sh <= 0) return [];
        return [...hl].map(fid => {
          const off = posByFid[fid];
          if (off == null) return null;
          return { fid, pos: (off/sh) * ch };
        }).filter(Boolean);
      }, [hl, posByFid, sh, ch]);

      // 현재 보고 있는 날짜 (sticky 헤더용) - 스크롤 위치 기준 가장 최근에 나온 date 섹션
      const currentDate = useMemo(() => {
        if (!flat || !flat.length) return null;
        const target = (scrollSt.st || 0) + 4; // 작은 버퍼: 날짜 구분선이 막 위로 사라진 직후도 그 날짜 유지
        // 이진 탐색: posIndex[i] <= target 인 가장 큰 i
        let lo = 0, hi = flat.length;
        while (lo < hi) {
          const mid = (lo + hi) >> 1;
          if (posIndex[mid] <= target) lo = mid + 1; else hi = mid;
        }
        let idx = lo - 1;
        // 그 위치에서 뒤로 가장 가까운 date 항목 찾기
        while (idx >= 0 && flat[idx].type !== "date") idx--;
        if (idx < 0) {
          // 첫 화면(스크롤 0 부근) — 가장 첫 date 반환
          const first = flat.find(f => f.type === "date");
          return first ? first.dk : null;
        }
        return flat[idx].dk;
      }, [flat, posIndex, scrollSt.st]);

      const setFsS = d => setFs(p => { const n = Math.max(10, Math.min(24, p+d)); ls.set(K("fs"), String(n)); return n; });

      const onFileUpload = useCallback(e => {
        const f = e.target.files[0]; if (!f) return;
        e.target.value = "";
        handleFile(f);
      }, [handleFile]);

      // ─────────────────────────────────────────────
      // Render
      // ─────────────────────────────────────────────
      if (loading) return <div className="loading">저장된 대화를 불러오는 중...</div>;

      const lastDate = dates[dates.length-1] || "";

      return (
        <LightboxContext.Provider value={setLightboxUrl}>
          <div style={{height:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            {processing && <ProgressBar {...processing} />}
            {lightboxUrl && <Lightbox url={lightboxUrl} onClose={()=>setLightboxUrl(null)} />}
            {pending && <MergeDialog onMerge={onMerge} onReplace={onReplace} onCancel={()=>setPending(null)} newCount={pending.newMsgs.length} existCount={pending.existMsgs.length} attachCount={pending.attachEntries?pending.attachEntries.length:0} />}
            <StatBanner stats={stats} onClose={()=>setStats(null)} />

            {/* TTS 선택 모드 안내 배너 */}
            {ttsSelectMode && !ttsState.active && (
              <div style={{position:"fixed",top:64,left:"50%",transform:"translateX(-50%)",background:"#0e7490",color:"#fff",padding:"8px 16px",borderRadius:20,fontSize:12,zIndex:120,boxShadow:"0 4px 14px rgba(8,145,178,0.4)",display:"flex",alignItems:"center",gap:10}}>
                <span>🎯 시작할 메시지를 클릭하세요 (채상욱 / 회색인간만 읽음)</span>
                <button onClick={()=>setTtsSelectMode(false)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:4,padding:"3px 8px",fontSize:11,cursor:"pointer",fontWeight:600}}>취소</button>
              </div>
            )}

            {/* TTS 재생 컨트롤 바 */}
            {ttsState.active && (
              <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",background:"#0f172a",border:"1px solid #22d3ee",borderRadius:12,padding:"10px 14px",zIndex:120,boxShadow:"0 8px 28px rgba(34,211,238,0.25)",display:"flex",alignItems:"center",gap:8,maxWidth:"95vw",flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"#22d3ee",fontWeight:700,minWidth:0}}>
                  🔊 {ttsState.idx+1} / {ttsState.total}
                  {ttsQueueRef.current[ttsState.idx] && (
                    <span style={{color:"#94a3b8",fontWeight:500,marginLeft:8}}>
                      · {ttsQueueRef.current[ttsState.idx].user}
                    </span>
                  )}
                </span>
                <button style={BS} onClick={ttsPrev} title="이전 메시지">⏮</button>
                <button style={{...BS, background:"#22d3ee", color:"#0f172a", borderColor:"#22d3ee", fontWeight:700}} onClick={ttsPauseToggle} title={ttsState.paused?"재생":"일시정지"}>
                  {ttsState.paused ? "▶ 재생" : "⏸ 일시정지"}
                </button>
                <button style={BS} onClick={ttsNext} title="다음 메시지">⏭</button>
                <span style={{color:"#475569"}}>│</span>
                <label style={{fontSize:11,color:"#94a3b8",display:"flex",alignItems:"center",gap:4}}>
                  속도
                  <select value={ttsRate} onChange={e=>setTtsRate(parseFloat(e.target.value))} style={{...BS,padding:"3px 6px"}}>
                    <option value="0.7">0.7x</option>
                    <option value="0.85">0.85x</option>
                    <option value="1">1.0x</option>
                    <option value="1.15">1.15x</option>
                    <option value="1.3">1.3x</option>
                    <option value="1.5">1.5x</option>
                    <option value="1.75">1.75x</option>
                    <option value="2">2.0x</option>
                  </select>
                </label>
                <button style={{...BS, color:"#fca5a5", borderColor:"#7f1d1d"}} onClick={ttsStop} title="정지">⏹ 정지</button>
              </div>
            )}

            {/* Header */}
            <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"8px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0,flexWrap:"wrap",minHeight:48}}>
              <span style={{fontSize:14,fontWeight:700,color:"#a78bfa",letterSpacing:"-0.3px"}}>📢 주식부자 공지방</span>
              <label style={{...BS,display:"inline-flex",alignItems:"center",gap:4,marginLeft:"auto"}}>
                📂 CSV / TXT / ZIP 업로드
                <input type="file" accept=".csv,.txt,.zip" onChange={onFileUpload} style={{display:"none"}} />
              </label>
            </div>

            {(!msgs || msgs.length === 0) ? (
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#e2e8f0"}}>
                <div style={{textAlign:"center",padding:40,maxWidth:460,background:"#1e293b",borderRadius:14,boxShadow:"0 4px 30px rgba(0,0,0,0.4)",border:"1px solid #334155"}}>
                  <div style={{fontSize:50,marginBottom:14}}>📢</div>
                  <h2 style={{fontSize:18,fontWeight:700,marginBottom:8,color:"#e2e8f0"}}>주식부자 공지방</h2>
                  <p style={{color:"#94a3b8",marginBottom:8,fontSize:12,lineHeight:1.8}}>대화 내용이 아직 없습니다.<br/>상단의 📂 업로드 버튼으로 카카오톡 export 파일을 추가하세요.</p>
                  <div style={{background:"#422006",border:"1px solid #92400e",borderRadius:8,padding:"10px 14px",marginTop:14,fontSize:11,color:"#fde68a",lineHeight:1.7,textAlign:"left"}}>
                    💡 <strong>ZIP 업로드:</strong> 텍스트(.txt/.csv) + 이미지/PDF/문서가 함께 들어있는 ZIP을 올리면 첨부가 자동 매칭됩니다.
                  </div>
                </div>
              </div>
            ) : (
              <React.Fragment>
                {/* Toolbar */}
                <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"6px 14px",display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap",minHeight:42}}>
                  <span style={{fontSize:11,color:"#94a3b8"}}>
                    {`${msgs.length.toLocaleString()}개 · ~${fmtDateLabel(lastDate)}`}
                  </span>
                  <span style={{color:"#475569"}}>│</span>
                  <select onChange={e=>{if(!e.target.value)return;scrollToDate(e.target.value);e.target.value="";}} style={{...BS,padding:"4px 8px"}}>
                    <option value="">📅 날짜 이동</option>
                    {[...dates].reverse().map(d=><option key={d} value={d}>{fmtDateLabel(d)}</option>)}
                  </select>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <button style={BS} onClick={()=>setFsS(-1)}>A−</button>
                    <span style={{fontSize:12,color:"#94a3b8",minWidth:22,textAlign:"center",fontWeight:600}}>{fs}</span>
                    <button style={BS} onClick={()=>setFsS(1)}>A+</button>
                  </div>
                  <span style={{color:"#475569"}}>│</span>
                  <div style={{display:"flex",alignItems:"center",gap:4}} title="대화 이동: ↑/↓ &#10;날짜 이동: Cmd(또는 Ctrl)+↑/↓">
                    <button style={BS} onClick={()=>navByMsg("up")} title="이전 대화 (↑)">↑</button>
                    <button style={BS} onClick={()=>navByMsg("down")} title="다음 대화 (↓)">↓</button>
                    <button style={BS} onClick={()=>navByDate("up")} title="이전 날짜 (Cmd/Ctrl+↑)">⇞</button>
                    <button style={BS} onClick={()=>navByDate("down")} title="다음 날짜 (Cmd/Ctrl+↓)">⇟</button>
                  </div>
                  <span style={{color:"#475569"}}>│</span>
                  {/* TTS */}
                  <div style={{display:"flex",alignItems:"center",gap:4}} title="채상욱/회색인간 메시지만 읽어줍니다">
                    <button
                      style={{...BS, background: ttsSelectMode ? "#06b6d4" : (ttsState.active ? "#0891b2" : BS.background), color: (ttsSelectMode||ttsState.active) ? "#fff" : BS.color, borderColor: (ttsSelectMode||ttsState.active) ? "#22d3ee" : BS.border}}
                      onClick={() => {
                        if (!ttsSupported) { alert("이 브라우저는 음성합성(TTS)을 지원하지 않습니다."); return; }
                        if (ttsState.active) { ttsStop(); return; }
                        setTtsSelectMode(v => !v);
                      }}
                      title={ttsState.active ? "TTS 정지" : (ttsSelectMode ? "선택 모드 취소" : "TTS 시작 위치 선택")}
                    >
                      {ttsState.active ? "⏹ TTS" : (ttsSelectMode ? "✕ 선택중" : "🔊 TTS")}
                    </button>
                  </div>
                  <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:hl.size>0?"#fbbf24":"#64748b",fontWeight:700}}>✏ {hl.size}개</span>
                    <button style={BS} onClick={()=>navHL("p")}>↑ 이전</button>
                    <button style={BS} onClick={()=>navHL("n")}>이후 ↓</button>
                  </div>
                </div>

                {/* Body */}
                <div style={{flex:1,display:"flex",overflow:"hidden",position:"relative"}}>
                  {/* 스크롤 중 현재 보고 있는 날짜를 상단에 고정 표시 */}
                  {currentDate && (
                    <div style={{position:"absolute", top:8, left:0, right:SB_W, display:"flex", justifyContent:"center", pointerEvents:"none", zIndex:5}}>
                      <div style={{background:"rgba(15,23,42,0.85)", backdropFilter:"blur(6px)", WebkitBackdropFilter:"blur(6px)", border:"1px solid #475569", borderRadius:16, padding:"4px 16px", fontSize:11.5, fontWeight:700, color:"#e2e8f0", boxShadow:"0 4px 14px rgba(0,0,0,0.35)", letterSpacing:"-0.2px"}}>
                        📅 {fmtDateLabel(currentDate)}
                      </div>
                    </div>
                  )}
                  <div id="clist" ref={listRef} className={ttsSelectMode ? "tts-select-mode" : ""} style={{flex:1,overflowY:"scroll",padding:"8px 0 24px",scrollbarWidth:"none",position:"relative"}}>
                    <div className="clist-inner">
                      <VirtualList flat={flat} posIndex={posIndex} totalH={totalH} hl={hl} fs={fs} onHL={toggleHL} listRef={listRef} onScroll={onScroll} onMeasure={onMeasure}
                        ttsSelectMode={ttsSelectMode}
                        ttsCurrentFid={ttsState.fid}
                        onTTSPick={ttsStartFromFid} />
                    </div>
                  </div>
                  <div ref={trackRef} onClick={onTC} style={{width:SB_W,flexShrink:0,background:"#1e293b",borderLeft:"1px solid #334155",position:"relative",cursor:"pointer",userSelect:"none"}}>
                    <div onMouseDown={onTD} style={{position:"absolute",left:3,right:3,top:tt,height:th,background:"#475569",borderRadius:4,cursor:"ns-resize",zIndex:2}} />
                    {markers.map(({fid,pos}) => (
                      <div key={fid} onClick={e=>{e.stopPropagation();scrollToFid(fid);}} style={{position:"absolute",left:1,right:1,top:Math.max(0,pos-1),height:4,background:"#fbbf24",borderRadius:2,zIndex:3,cursor:"pointer",boxShadow:"0 0 4px rgba(251,191,36,0.7)"}} />
                    ))}
                  </div>
                </div>
              </React.Fragment>
            )}
          </div>
        </LightboxContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  })();
  </script>
</body>
</html>
